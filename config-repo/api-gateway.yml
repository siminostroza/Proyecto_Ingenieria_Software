server:
  port: 8080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true # Recomendado para evitar errores de mayúsculas en las URLs
      
      # MEJORA: Filtro GLOBAL para todos los servicios (Genera un ID único por petición)
      default-filters:
        - AddRequestHeader=X-Trace-Id, ${random.uuid}

      routes:
      # 1. Seguridad y Autenticación (Prioridad 1 para el Login)
        - id: ms-auth
          uri: lb://ms-auth
          predicates:
            - Path=/api/auth/**

        # RUTA PARA USUARIOS (Activa)
