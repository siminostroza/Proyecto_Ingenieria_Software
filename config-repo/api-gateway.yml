# Configuración de Cliente Eureka (Centralizada)
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true # Recomendado en Docker para evitar problemas de resolución de nombres
    hostname: api-gateway

# Actuator: Configuración para el monitoreo y healthcheck de Docker
management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true # Permite ver las rutas activas vía Actuator