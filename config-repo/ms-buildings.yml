server:
  port: 8084  # Puerto de la serie correlativa asignado a Edificios

spring:
  datasource:
    url: jdbc:mysql://mysql-db:3306/db_service_buildings?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: app_user
    password: "1234"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# Nota: Toda la configuración base de Eureka e IP distribuidas se hereda limpiamente del global

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Telemetría avanzada unificada exclusiva para este módulo relacional
logging:
  level:
    root: INFO
    com.logistica: DEBUG  # <-- Crucial para rastrear tus Controllers y Services de Edificios
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.hibernate.orm.results.graph.AST: TRACE
    org.hibernate.type.descriptor.jdbc.spi.JdbcTypeRegistry: TRACE