server:
  port: ${PORT:8091} # Puerto correlativo asignado a la pasarela de pagos

spring:
  datasource:
    # Conectado al esquema unificado de pagos
    url: jdbc:mysql://mysql-db:3306/db_service_payments?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: app_user
    password: "1234"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# OpenFeign: Habilita el manejo seguro de excepciones y reintentos para transacciones bancarias
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

# Telemetría avanzada unificada adaptada para el módulo financiero
logging:
  level:
    root: INFO
    com.logistica: DEBUG  # Esencial para rastrear estados de transacciones y respuestas de pasarelas
    org.hibernate.SQL: DEBUG  # Muestra las sentencias SQL ejecutadas de los cobros
    # Compatibilidad y profundidad para Hibernate 6.x (Spring Boot 3.x)
    org.hibernate.orm.results.graph.AST: TRACE
    org.hibernate.type.descriptor.jdbc.spi.JdbcTypeRegistry: TRACE