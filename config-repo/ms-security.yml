server:
  port: ${PORT:8087}

spring:
  datasource:
    url: jdbc:mysql://mysql-db:3306/db_service_security?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: app_user
    password: "1234"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # Mensajería específica para reportar bloqueos o auditoría de tokens JWT
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

# Telemetría avanzada unificada exclusiva para auditorías de seguridad relacionales
logging:
  level:
    root: INFO
    com.logistica: DEBUG  # Indispensable para validar la expiración de tokens o accesos denegados
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.hibernate.orm.results.graph.AST: TRACE
    org.hibernate.type.descriptor.jdbc.spi.JdbcTypeRegistry: TRACE