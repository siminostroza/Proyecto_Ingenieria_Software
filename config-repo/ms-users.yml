server:
  port: 8083

# 1. Identidad del Microservicio
# - Este es el nombre que identificará el eureka
spring:
  application:
    name: ms-users

  datasource:
    url: jdbc:mysql://logistica-mysql:3306/db_service_users?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: app_user
    password: "1234"

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    hostname: localhost

logging:
  level:
    example:
      ms-users:
        client:
          StockClient: DEBUG
