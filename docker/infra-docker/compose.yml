# Futuramente borrar los ports para seguridad del docker
# Se dejan por practicidad de desarrollo.

services:
  mysql-db:
    image: mysql:8.0
    container_name: logistica-mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root
    ports:
      - "3307:3306" #el primer valor podría cambiarse para que windows lo use, pero internamente seguirá con 3306
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d #se deja para escalabilidad si en un futuro se agregan más .sql
    networks:
      - edificios-network
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Gestor de bbdd via web, para facilitar visual y funcionalidad (sin necesidad de instalar algún programa)
  adminer:
    image: adminer
    container_name: brm-adminer
    restart: always
    ports:
      - "8880:8080" #Para entrar debo poner mysql-db
    networks:
      - edificios-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: brm-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - edificios-network
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "timeout 1s bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/2181'",
        ]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 5s # Le da 5 segundos de gracia para arrancar antes de empezar a testear

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: brm-kafka
    ports:
      - "9092:9092" #dirección que uso yo externamente
    depends_on:
      zookeeper:
        condition: service_healthy # Obliga a esperar la salud real de Zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # CORRECCIÓN REALIZADA: Se unificó el listener interno a "kafka:29092" para coincidir
      # exactamente con el nombre de este servicio en el stack de Docker Compose, permitiendo
      # que ms-users y ms-auth resuelvan el DNS interno sin errores.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - edificios-network
    healthcheck:
      test:
        [
          "CMD",
          "kafka-topics",
          "--bootstrap-server",
          "localhost:9092",
          "--list",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  eureka-server:
    build: ../../infraestructure/eureka-server
    container_name: logistica-eureka
    ports:
      - "8761:8761"
    networks:
      - edificios-network
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    healthcheck:
      # NOTA DE SEGURIDAD: Asegurar que el Dockerfile de eureka instale 'curl' si se usan imágenes limpias tipo Alpine
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  config-server:
    build: ../../infraestructure/config-server
    container_name: brm-config-server
    ports:
      - "8888:8888"
    volumes:
      - ../../config-repo:/app/config-repo
    environment:
      - SPRING_PROFILES_ACTIVE=native,docker
      - SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS=file:/app/config-repo/
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - edificios-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build: ../../infraestructure/api-gateway
    container_name: brm-api-gateway
    ports:
      - "9090:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888/
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - edificios-network

  ms-auth:
    build: ../../services/ms-auth
    container_name: brm-ms-auth
    ports:
      - "8081:8081"
    restart: on-failure
    depends_on:
      mysql-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888/
    networks:
